name: Money Mingle Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

# 🔹 We separated them to keep things fast and reliable.
# Build + unit tests run quickly and almost never fail, so you get instant feedback that the app works.
# Instrumented tests are slower and depend on an emulator, which can sometimes fail.
# By splitting them:
# The main build still passes even if the emulator has issues
# We can clearly see which part failed

  # 🔹 JOB 1: Build + Unit Tests 
  build:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Money-Mingle-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk


  # 🔹 JOB 2: Instrumented Tests (EMULATOR), ONLY runs if Job 1 succeeds
  androidTest:
    name: Instrumented Tests
    runs-on: ubuntu-latest
    needs: build   # only runs if build job 1 succeeds

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run Instrumented Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: Nexus 6
          script: ./gradlew connectedDebugAndroidTest
